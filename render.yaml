services:
  - type: web
    name: megatown-staff-scheduler
    runtime: node
    buildCommand: git lfs pull || true && npm install --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # 2026-07-20: OCR 분기 env 전면 제거 — 로컬↔Render 결과 값 일치용
      #   기존 LOW_MEM / USE_SLANET / OCR_RETRY_LOW_MEM 제거
      #   대신 --expose-gc 로 명시적 gc() 호출을 유지 (메모리 회수는 필요)
      - key: NODE_OPTIONS
        value: "--expose-gc --max-old-space-size=400"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_API_KEY1
        sync: false
      - key: GEMINI_API_KEY2
        sync: false
      - key: GEMINI_API_KEY3
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: VITE_VAPID_PUBLIC_KEY
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
